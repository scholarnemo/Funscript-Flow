name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy decord opencv-python opencv-contrib-python nuitka

      - name: Build with Nuitka
        run: |
          python -m nuitka FunscriptFlow.pyw --standalone --enable-plugin=tk-inter --windows-console-mode=disable --windows-icon-from-ico=icon.ico --assume-yes-for-downloads

      - name: Bundle runtime files
        run: |
          copy strings.json FunscriptFlow.dist\
          copy readme.txt   FunscriptFlow.dist\
          copy icon.png      FunscriptFlow.dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FunscriptFlow-Windows
          path: FunscriptFlow.dist\

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path FunscriptFlow.dist\* -DestinationPath FunscriptFlow-Windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FunscriptFlow-Windows.zip
          generate_release_notes: true
