name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy decord opencv-python opencv-contrib-python nuitka

      - name: Build with Nuitka
        run: |
          python -m nuitka FunscriptFlow.pyw --standalone --enable-plugin=tk-inter --windows-console-mode=disable --windows-icon-from-ico=icon.ico --assume-yes-for-downloads

      - name: Copy decord native DLLs
        run: |
          $pydir = python -c "import decord, os; print(os.path.dirname(decord.__file__))"
          New-Item -ItemType Directory -Force -Path FunscriptFlow.dist\decord\
          copy "$pydir\*.dll" FunscriptFlow.dist\decord\ -ErrorAction SilentlyContinue
          copy "$pydir\*.pyd" FunscriptFlow.dist\decord\ -ErrorAction SilentlyContinue

      - name: Copy MSVC runtime DLLs (needed by onnxruntime)
        run: |
          $pyhome = python -c "import sys; print(sys.prefix)"
          copy "$pyhome\vcruntime140.dll" FunscriptFlow.dist\ -ErrorAction SilentlyContinue
          copy "$pyhome\vcruntime140_1.dll" FunscriptFlow.dist\ -ErrorAction SilentlyContinue
          copy "$pyhome\msvcp140.dll" FunscriptFlow.dist\ -ErrorAction SilentlyContinue

      - name: Bundle runtime files
        run: |
          copy strings.json FunscriptFlow.dist\strings.json
          copy readme.txt   FunscriptFlow.dist\readme.txt
          copy icon.png      FunscriptFlow.dist\icon.png
          if (Test-Path detector.onnx) { copy detector.onnx FunscriptFlow.dist\detector.onnx }
          if (Test-Path 320n.onnx) { copy 320n.onnx FunscriptFlow.dist\320n.onnx }
          if (Test-Path 640m.onnx) { copy 640m.onnx FunscriptFlow.dist\640m.onnx }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FunscriptFlow-Windows
          path: FunscriptFlow.dist\

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path FunscriptFlow.dist\* -DestinationPath FunscriptFlow-Windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FunscriptFlow-Windows.zip
          generate_release_notes: true
